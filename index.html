<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songs That Remind Me of You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #8B1A1A;
      --red-dark: #5C0F0F;
      --red-mid: #A32020;
      --cream:  #F2E8D9;
      --cream-dark: #D9C8B0;
      --black:  #0E0A08;
      --tape-body: #111111;
      --tape-shine: #2a2a2a;
      --reel:   #1c1c1c;
      --hub:    #8B1A1A;
      --spoke:  #f2e8d9;
    }

    html, body {
      min-height: 100%;
      font-family: 'IM Fell English', serif;
      background-color: var(--red);
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: overlay;
    }

    /* ── Vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* ── Layout ── */
    .stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      gap: 0;
    }

    /* ── Note above cassette ── */
    .note-wrap {
      max-width: 480px;
      width: 100%;
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(-12px);
      animation: fadeUp 1.1s ease forwards 0.3s;
    }

    .note-text {
      font-family: 'Caveat', cursive;
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.5;
      letter-spacing: 0.01em;
      opacity: 0.88;
    }

    .note-dash {
      display: block;
      margin: 6px auto 0;
      width: 36px;
      height: 1px;
      background: var(--cream);
      opacity: 0.35;
    }

    /* ── Cassette shell ── */
    .cassette-wrap {
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.7s;
      perspective: 900px;
    }

    .cassette {
      position: relative;
      width: 340px;
      height: 220px;
      background: linear-gradient(160deg, #1e1e1e 0%, #0d0d0d 60%, #1a1a1a 100%);
      border-radius: 12px 12px 18px 18px;
      box-shadow:
        0 2px 0 #333 inset,
        0 -2px 0 #000 inset,
        6px 0 12px rgba(0,0,0,0.6),
        0 18px 48px rgba(0,0,0,0.7),
        0 4px 0 rgba(255,255,255,0.05) inset;
      transform-style: preserve-3d;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotateX(2deg); }
      50%       { transform: translateY(-8px) rotateX(4deg); }
    }

    /* screws */
    .cassette::before, .cassette::after {
      content: '';
      position: absolute;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #444, #111);
      box-shadow: 0 1px 2px rgba(0,0,0,0.8) inset;
      top: 10px;
    }
    .cassette::before { left: 12px; }
    .cassette::after  { right: 12px; }

    /* screws bottom */
    .screw-bl, .screw-br {
      position: absolute;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #444, #111);
      box-shadow: 0 1px 2px rgba(0,0,0,0.8) inset;
      bottom: 10px;
    }
    .screw-bl { left: 12px; }
    .screw-br { right: 12px; }

    /* ── Label ── */
    .label {
      position: absolute;
      top: 10px;
      left: 28px;
      right: 28px;
      height: 68px;
      background: linear-gradient(170deg, #faf4ea 0%, #e8dcc8 100%);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      overflow: hidden;
    }

    .label::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        transparent,
        transparent 14px,
        rgba(0,0,0,0.04) 14px,
        rgba(0,0,0,0.04) 15px
      );
    }

    .label-title {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a0a00;
      text-align: center;
      line-height: 1.25;
      z-index: 1;
      padding: 0 8px;
    }

    .label-sub {
      font-family: 'Caveat', cursive;
      font-size: 0.72rem;
      color: #5a3a1a;
      opacity: 0.75;
      letter-spacing: 0.05em;
      z-index: 1;
    }

    /* ── Tape window ── */
    .window {
      position: absolute;
      bottom: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 58px;
      background: #000;
      border-radius: 6px;
      box-shadow: 0 0 0 2px #1a1a1a, 0 2px 8px rgba(0,0,0,0.8) inset;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 20px;
      overflow: hidden;
    }

    /* tape strip */
    .window::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 10px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #1a0a00, #2d1500, #1a0a00);
      opacity: 0.8;
    }

    /* ── Reels ── */
    .reel {
      position: relative;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #2a2a2a 30%, #111 100%);
      box-shadow:
        0 0 0 3px #0a0a0a,
        0 0 0 5px #222,
        0 0 0 6px #0a0a0a,
        0 2px 6px rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .reel-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, #444 0%, #1a1a1a 60%, #0d0d0d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px #333 inset;
    }

    .hub {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--hub);
      box-shadow: 0 0 4px rgba(139,26,26,0.6);
    }

    /* spokes */
    .reel-inner::before, .reel-inner::after {
      content: '';
      position: absolute;
      width: 1.5px;
      height: 10px;
      background: #555;
      border-radius: 1px;
    }
    .reel-inner::before { transform: rotate(0deg)   translateY(-6px); }
    .reel-inner::after  { transform: rotate(120deg) translateY(-6px); }

    .reel.spinning      { animation: spin 1.8s linear infinite; }
    .reel.spinning-slow { animation: spin 3.5s linear infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Bottom tabs ── */
    .tab-left, .tab-right {
      position: absolute;
      bottom: 0;
      width: 55px;
      height: 28px;
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border-radius: 0 0 6px 6px;
    }
    .tab-left  { left: 40px; }
    .tab-right { right: 40px; }

    /* holes in tabs */
    .tab-left::before, .tab-right::before {
      content: '';
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 10px;
      background: #000;
      border-radius: 2px;
    }

    /* ── Song info below cassette ── */
    .song-info {
      margin-top: 32px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.2s;
    }

    .song-title {
      font-family: 'Special Elite', monospace;
      font-size: 1.25rem;
      letter-spacing: 0.06em;
      color: var(--cream);
      text-transform: uppercase;
    }

    .song-artist {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: var(--cream);
      opacity: 0.65;
      margin-top: 4px;
    }

    /* ── Spotify embed ── */
    .spotify-wrap {
      margin-top: 28px;
      width: 340px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.5s;
    }

    .spotify-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── No song state ── */
    .no-song {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: var(--cream);
      opacity: 0.6;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
      margin-top: 24px;
    }

    /* ── Past songs drawer ── */
    .past-toggle {
      margin-top: 48px;
      background: none;
      border: none;
      font-family: 'Caveat', cursive;
      font-size: 0.9rem;
      color: var(--cream);
      opacity: 0.4;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.2s;
      opacity: 0;
      animation: fadeUp 1s ease forwards 2s;
    }
    .past-toggle:hover { opacity: 0.7; }

    .past-list {
      display: none;
      margin-top: 20px;
      width: 340px;
      border-top: 1px solid rgba(242,232,217,0.15);
      padding-top: 20px;
    }
    .past-list.open { display: block; }

    .past-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(242,232,217,0.08);
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: var(--cream);
      opacity: 0.65;
    }
    .past-item span { font-size: 0.78rem; opacity: 0.45; align-self: center; }

    /* ── Date stamp ── */
    .date-stamp {
      position: fixed;
      bottom: 18px;
      right: 22px;
      font-family: 'Caveat', cursive;
      font-size: 0.78rem;
      color: var(--cream);
      opacity: 0.25;
      letter-spacing: 0.1em;
    }

    /* ── Sparkle corner ── */
    .sparkle {
      position: fixed;
      bottom: 18px;
      left: 22px;
      font-size: 1.1rem;
      opacity: 0.25;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(1.15); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* mobile */
    @media (max-width: 400px) {
      .cassette { width: 290px; height: 188px; }
      .spotify-wrap { width: 290px; }
      .past-list { width: 290px; }
      .label-title { font-size: 0.95rem; }
      .window { width: 180px; height: 50px; }
      .reel { width: 38px; height: 38px; }
      .reel-inner { width: 23px; height: 23px; }
    }
  </style>
</head>
<body>

<div class="stage">

  <!-- Note -->
  <div class="note-wrap" id="noteWrap" style="display:none">
    <p class="note-text" id="noteText"></p>
    <span class="note-dash"></span>
  </div>

  <!-- Cassette -->
  <div class="cassette-wrap">
    <div class="cassette">
      <div class="screw-bl"></div>
      <div class="screw-br"></div>

      <!-- Label -->
      <div class="label">
        <div class="label-title" id="labelTitle">Songs That Remind Me of You</div>
        <div class="label-sub" id="labelSub">Side A</div>
      </div>

      <!-- Tape window -->
      <div class="window">
        <div class="reel" id="reelLeft">
          <div class="reel-inner">
            <div class="hub"></div>
          </div>
        </div>
        <div class="reel" id="reelRight">
          <div class="reel-inner">
            <div class="hub"></div>
          </div>
        </div>
      </div>

      <!-- Bottom tabs -->
      <div class="tab-left"></div>
      <div class="tab-right"></div>
    </div>
  </div>

  <!-- Song info -->
  <div class="song-info" id="songInfo" style="display:none">
    <div class="song-title" id="songTitle"></div>
    <div class="song-artist" id="songArtist"></div>
  </div>

  <!-- No song -->
  <div class="no-song" id="noSong" style="display:none">
    No song for today yet.<br>Come back tomorrow.
  </div>

  <!-- Spotify -->
  <div class="spotify-wrap" id="spotifyWrap" style="display:none">
    <iframe id="spotifyIframe" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <!-- Past songs toggle -->
  <button class="past-toggle" id="pastToggle" onclick="togglePast()" style="display:none">↑ past songs</button>
  <div class="past-list" id="pastList"></div>

</div>

<div class="date-stamp" id="dateStamp"></div>
<div class="sparkle">✦</div>

<script>
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // Format date nicely
  const dateFormatted = today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('dateStamp').textContent = dateFormatted;

  fetch('songs.json')
    .then(r => r.json())
    .then(songs => {
      // Sort songs by date ascending
      songs.sort((a, b) => a.date.localeCompare(b.date));

      const todaySong = songs.find(s => s.date === todayStr);
      const pastSongs = songs.filter(s => s.date < todayStr).reverse();

      if (todaySong) {
        // Show note
        if (todaySong.note) {
          document.getElementById('noteText').textContent = todaySong.note;
          document.getElementById('noteWrap').style.display = 'block';
        }

        // Update label
        document.getElementById('labelTitle').textContent = todaySong.title;
        document.getElementById('labelSub').textContent = '— ' + todaySong.artist;

        // Song info
        document.getElementById('songTitle').textContent = todaySong.title;
        document.getElementById('songArtist').textContent = todaySong.artist;
        document.getElementById('songInfo').style.display = 'block';

        // Spotify — autoplay + loop via ?autoplay=1&loop=1
        const baseUrl = todaySong.spotify_embed_url.split('?')[0];
        document.getElementById('spotifyIframe').src = baseUrl + '?autoplay=1&loop=1';
        document.getElementById('spotifyWrap').style.display = 'block';

        // Spin reels
        document.getElementById('reelLeft').classList.add('spinning');
        document.getElementById('reelRight').classList.add('spinning-slow');
      } else {
        document.getElementById('noSong').style.display = 'block';
      }

      // Past songs
      if (pastSongs.length > 0) {
        const btn = document.getElementById('pastToggle');
        btn.style.display = 'inline-block';

        const list = document.getElementById('pastList');
        pastSongs.forEach(s => {
          const d = document.createElement('div');
          d.className = 'past-item';
          const dateLabel = new Date(s.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          d.innerHTML = `<div>${s.title} <em style="opacity:.5;font-size:.85em">— ${s.artist}</em></div><span>${dateLabel}</span>`;
          list.appendChild(d);
        });
      }
    })
    .catch(() => {
      document.getElementById('noSong').style.display = 'block';
      document.getElementById('noSong').textContent = 'Could not load songs. Make sure songs.json is in the same folder.';
    });

  function togglePast() {
    const list = document.getElementById('pastList');
    const btn  = document.getElementById('pastToggle');
    const isOpen = list.classList.toggle('open');
    btn.textContent = isOpen ? '↓ hide past songs' : '↑ past songs';
  }
</script>
</body>
</html>
