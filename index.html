<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #7a1515;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px 64px;
    }

    .note-wrap {
      max-width: 360px;
      width: 100%;
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(-8px);
      animation: fadeFull 1s ease forwards 0.35s;
    }
    .note-text {
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      font-weight: 400;
      color: #e8d5b7;
      line-height: 1.55;
      white-space: pre-line;
    }

    .cassette-wrap {
      opacity: 0;
      animation: fadeFull 1.1s ease forwards 0.7s;
      perspective: 1000px;
    }

    .cassette {
      position: relative;
      width: 340px;
      height: 215px;
      background: linear-gradient(155deg, #1e1e1e 0%, #0d0d0d 55%, #1c1c1c 100%);
      border-radius: 12px 12px 18px 18px;
      box-shadow:
        0 2px 0 #333 inset,
        0 -2px 0 #000 inset,
        6px 0 14px rgba(0,0,0,.5),
        0 22px 55px rgba(0,0,0,.75),
        0 4px 0 rgba(255,255,255,.04) inset;
      cursor: pointer;
    }

    .screw {
      position: absolute;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #444, #111);
      box-shadow: 0 1px 2px rgba(0,0,0,.8) inset;
    }
    .screw.tl { top:10px;    left:12px;  }
    .screw.tr { top:10px;    right:12px; }
    .screw.bl { bottom:10px; left:12px;  }
    .screw.br { bottom:10px; right:12px; }

    .label {
      position: absolute;
      top:10px; left:28px; right:28px;
      height: 70px;
      background: linear-gradient(165deg, #faf4ea, #e8dcc8);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }
    .label::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        transparent, transparent 13px,
        rgba(0,0,0,.04) 13px, rgba(0,0,0,.04) 14px
      );
    }
    .label-title {
      font-family: 'Caveat', cursive;
      font-size: 1.08rem;
      font-weight: 600;
      color: #1a0a00;
      text-align: center;
      line-height: 1.25;
      z-index: 1;
      padding: 0 10px;
    }
    .label-sub {
      font-family: 'Caveat', cursive;
      font-size: .7rem;
      color: #5a3a1a;
      opacity: .7;
      letter-spacing: .05em;
      z-index: 1;
    }

    .window {
      position: absolute;
      bottom:52px; left:50%;
      transform: translateX(-50%);
      width:215px; height:58px;
      background: #000;
      border-radius: 6px;
      box-shadow: 0 0 0 2px #1a1a1a, 0 2px 8px rgba(0,0,0,.85) inset;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 18px;
      overflow: hidden;
    }
    .window::before {
      content: '';
      position: absolute;
      top:50%; left:0; right:0;
      height: 9px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #1a0a00, #2e1500, #1a0a00);
      opacity: .8;
    }

    .reel {
      position: relative;
      width:46px; height:46px;
      border-radius: 50%;
      background: radial-gradient(circle, #2a2a2a 30%, #111 100%);
      box-shadow:
        0 0 0 3px #0a0a0a,
        0 0 0 5px #222,
        0 0 0 6px #0a0a0a,
        0 2px 6px rgba(0,0,0,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .reel-inner {
      width:28px; height:28px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, #444 0%, #1a1a1a 60%, #0d0d0d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px #333 inset;
      position: relative;
    }
    .hub {
      width:10px; height:10px;
      border-radius: 50%;
      background: #8B1A1A;
      box-shadow: 0 0 4px rgba(139,26,26,.6);
      position: relative; z-index:2;
    }
    .spoke {
      position: absolute;
      width:1.5px; height:10px;
      background: #555;
      border-radius: 1px;
      transform-origin: center bottom;
    }

    .reel.spin      { animation: spin 2s linear infinite; }
    .reel.spin-slow { animation: spin 3.8s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .tab {
      position: absolute;
      bottom:0; width:52px; height:26px;
      background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
      border-radius: 0 0 6px 6px;
    }
    .tab-l { left:42px; }
    .tab-r { right:42px; }
    .tab::before {
      content: '';
      position: absolute;
      top:7px; left:50%;
      transform: translateX(-50%);
      width:11px; height:9px;
      background: #000;
      border-radius: 2px;
    }

    .no-song {
      margin-top: 28px;
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: #e8d5b7;
      opacity: .7;
      text-align: center;
      line-height: 1.6;
    }

    .past-btn {
      margin-top: 52px;
      background: none; border: none;
      font-family: 'Caveat', cursive;
      font-size: .8rem;
      color: #f2e8d9;
      cursor: pointer;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: opacity .2s;
      opacity: 0;
      animation: fadeToMuted 1s ease forwards 1.5s;
    }
    .past-btn:hover { opacity: .55 !important; }

    .past-list {
      display: none;
      margin-top: 16px;
      width: 320px;
      border-top: 1px solid rgba(242,232,217,.1);
      padding-top: 14px;
    }
    .past-list.open { display: block; }

    .past-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(242,232,217,.06);
      font-family: 'Caveat', cursive;
      font-size: .95rem;
      color: #f2e8d9;
      opacity: .45;
    }
    .past-date {
      font-size: .74rem;
      opacity: .5;
      flex-shrink: 0;
      margin-left: 12px;
    }

    @keyframes fadeToMuted { to { opacity: .3;  transform: translateY(0); } }
    @keyframes fadeFull    { to { opacity: 1;   transform: translateY(0); } }

    @media (max-width:400px) {
      .cassette  { width:290px; height:188px; }
      .past-list { width:290px; }
      .window    { width:180px; height:50px; }
      .reel      { width:38px;  height:38px; }
      .reel-inner{ width:23px;  height:23px; }
    }
  </style>
</head>
<body>

<div class="stage">

  <div class="note-wrap" id="noteWrap" style="display:none">
    <p class="note-text" id="noteText"></p>
  </div>

  <div class="cassette-wrap">
    <div class="cassette" id="cassette">
      <div class="screw tl"></div><div class="screw tr"></div>
      <div class="screw bl"></div><div class="screw br"></div>

      <div class="label">
        <div class="label-title" id="labelTitle">Songs That Remind Me of You</div>
        <div class="label-sub" id="labelSub">Side A</div>
      </div>

      <div class="window">
        <div class="reel" id="reelL">
          <div class="reel-inner">
            <div class="spoke" style="transform:rotate(0deg) translateY(-5px)"></div>
            <div class="spoke" style="transform:rotate(120deg) translateY(-5px)"></div>
            <div class="spoke" style="transform:rotate(240deg) translateY(-5px)"></div>
            <div class="hub"></div>
          </div>
        </div>
        <div class="reel" id="reelR">
          <div class="reel-inner">
            <div class="spoke" style="transform:rotate(60deg) translateY(-5px)"></div>
            <div class="spoke" style="transform:rotate(180deg) translateY(-5px)"></div>
            <div class="spoke" style="transform:rotate(300deg) translateY(-5px)"></div>
            <div class="hub"></div>
          </div>
        </div>
      </div>

      <div class="tab tab-l"></div>
      <div class="tab tab-r"></div>
    </div>
  </div>

  <div class="no-song" id="noSong" style="display:none">
    No song for today yet.<br>Come back tomorrow.
  </div>



</div>

<audio id="audioEl" preload="auto" loop></audio>

<script>
  const SONGS = [
    {
      date:   "2026-05-06",
      title:  "Songs that remind me of you",
      artist: "",
      mp3:    "songs/wonderwall.mp3",
      note: "And all the roads we have to walk are winding\nAnd all the lights that lead us there are blinding\nThere are many things that I would like to say to you\nBut I don't know how\nBecause maybe\nYou're gonna be the one that saves me\nAnd after all\n\nYou're my wonderwall"
    },
    {
      date:   "2026-05-05",
      title:  "Songs that remind me of you",
      artist: "",
      mp3:    "songs/sun.mp3",
      note: "You’re the sun, Kritika"
    }
  ];

  const todayStr  = new Date().toISOString().split('T')[0];
  const todaySong = SONGS.find(s => s.date === todayStr);
  const pastSongs = SONGS.filter(s => s.date < todayStr).reverse();
  const audio     = document.getElementById('audioEl');
  const cassette  = document.getElementById('cassette');

  if (todaySong) {
    if (todaySong.note) {
      document.getElementById('noteText').textContent = todaySong.note;
      document.getElementById('noteWrap').style.display = 'block';
    }
    document.getElementById('labelTitle').textContent = todaySong.title;
    document.getElementById('labelSub').textContent = todaySong.artist ? '— ' + todaySong.artist : '';

    audio.src = todaySong.mp3;
    const spinReels = () => {
      document.getElementById('reelL').className = 'reel spin';
      document.getElementById('reelR').className = 'reel spin-slow';
    };
    const stopReels = () => {
      document.getElementById('reelL').className = 'reel';
      document.getElementById('reelR').className = 'reel';
    };
    
    // Try autoplay first
    audio.play().then(spinReels).catch(() => {});
    
    // Toggle on every click
    cassette.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(spinReels);
      } else {
        audio.pause();
        stopReels();
      }
    });
  } else {
    document.getElementById('noSong').style.display = 'block';
  }


  function togglePast() {
    const list = document.getElementById('pastList');
    const btn  = document.getElementById('pastBtn');
    list.classList.toggle('open');
    btn.textContent = list.classList.contains('open') ? '↓ hide' : '↑ past songs';
  }
</script>
</body>
</html>
